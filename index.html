<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alpha Alliance Group</title>
    <meta name="description" content="Alpha Alliance Group — Strategic capital, digital assets, technology, finance, AI. A unified group with decentralized governance." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23E6BE8A'/%3E%3Cstop offset='100%25' stop-color='%23B8895E'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='32,5 54,18 54,46 32,59 10,46 10,18' fill='%23120F1F' stroke='%23D4A574' stroke-width='1.5'/%3E%3Ctext x='32' y='32' font-family='Georgia, serif' font-size='30' font-weight='600' fill='url(%23g)' text-anchor='middle' font-style='italic' dominant-baseline='central'%3E%CE%B1%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Fraunces:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script>
      (function () {
        try { if (sessionStorage.getItem('aa_xyz_intro')) document.documentElement.classList.add('intro-seen'); } catch (e) {}
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) document.documentElement.classList.add('reduced');
      })();
    </script>
    <style>
      #intro { position: fixed; inset: 0; background: #0A0E15; z-index: 200; display: flex; align-items: center; justify-content: center; transition: opacity 300ms ease; }
      #intro.done { opacity: 0; pointer-events: none; }
      html.intro-seen #intro, html.reduced #intro { display: none; }
      #intro svg { width: 72px; height: 72px; }
      #intro .hex-path, #intro .alpha-path { fill: none; stroke: #D4A574; stroke-width: 1.5; }
    </style>
  </head>
  <body>
    <div id="intro" aria-hidden="true">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <polygon class="hex-path" points="32,5 54,18 54,46 32,59 10,46 10,18"/>
        <text class="alpha-path" x="32" y="32" font-family="Georgia, serif" font-size="30" font-style="italic" text-anchor="middle" dominant-baseline="central">α</text>
      </svg>
    </div>
    <div id="root"></div>
    <script>
      (function () {
        var intro = document.getElementById('intro');
        var introSeen = document.documentElement.classList.contains('intro-seen');
        var reduced = document.documentElement.classList.contains('reduced');
        var introDone = false;
        function endIntro() {
          if (introDone || !intro) return;
          introDone = true;
          intro.classList.add('done');
          intro.addEventListener('transitionend', function () { if (intro.parentNode) intro.parentNode.removeChild(intro); });
        }
        if (intro && !introSeen && !reduced) {
          window.__aaIntroRan = true;
          try { sessionStorage.setItem('aa_xyz_intro', '1'); } catch (e) {}
          var hex = intro.querySelector('.hex-path');
          var alpha = intro.querySelector('.alpha-path');
          try {
            var hl = hex.getTotalLength();
            hex.style.strokeDasharray = hl;
            hex.style.strokeDashoffset = hl;
            hex.style.transition = 'stroke-dashoffset 500ms cubic-bezier(0.16,1,0.3,1)';
            alpha.style.opacity = '0';
            alpha.style.transition = 'opacity 550ms cubic-bezier(0.16,1,0.3,1) 350ms';
            requestAnimationFrame(function () {
              hex.style.strokeDashoffset = '0';
              alpha.style.opacity = '1';
            });
          } catch (e) {}
          setTimeout(endIntro, 950);
          ['wheel', 'touchstart', 'keydown', 'pointerdown'].forEach(function (ev) {
            window.addEventListener(ev, endIntro, { once: true, passive: true });
          });
        } else {
          if (intro && intro.parentNode) intro.parentNode.removeChild(intro);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
